services:
  - type: web
    name: wan-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENABLE_DASHBOARD
        value: "true"
      - key: DASHBOARD_HOST
        value: "0.0.0.0"
      - key: DISCORD_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: CLAN_URL
        sync: false
      - key: DASHBOARD_SECRET_KEY
        sync: false
      - key: DASHBOARD_URL
        sync: false
