services:
  - type: web
    name: WAN
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /api/health
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: ENABLE_DASHBOARD
        value: "true"
      - key: DASHBOARD_HOST
        value: "0.0.0.0"
      - key: DASHBOARD_SECRET_KEY
        sync: false
      - key: DASHBOARD_URL
        sync: false
      - key: GUILD_ID
        value: "1462688504436752489"
      - key: GEMINI_API_KEY
        value: "AIzaSyCk5yN4vaCdd99e1m0uIpgJDcKe33X-Mcs"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATA_DIR
        value: "/data"
      - key: DATABASE_URL
        value: "sqlite+aiosqlite:///data/bot.db"
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
