[pytest]
# Pytest configuration for watch party tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -ra

# Markers for organizing tests
markers =
    unit: Unit tests for individual components
    integration: Integration tests for Socket.IO events
    api: API endpoint tests
    storage: Storage and streaming tests
    chat: Chat functionality tests
    sync: Synchronization tests
    permissions: Permission system tests
    slow: Slow running tests
    requires_bot: Tests requiring Discord bot instance

# Coverage options
[coverage:run]
source = .
omit = 
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
