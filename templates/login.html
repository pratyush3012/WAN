<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WAN Bot — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#050709;color:#eceef8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 20%,rgba(124,58,237,.15) 0%,transparent 55%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(88,101,242,.12) 0%,transparent 55%);pointer-events:none;}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;animation:orbFloat 8s ease-in-out infinite;}
.orb1{width:400px;height:400px;background:rgba(124,58,237,.08);top:-100px;left:-100px;animation-delay:0s;}
.orb2{width:300px;height:300px;background:rgba(88,101,242,.07);bottom:-80px;right:-80px;animation-delay:3s;}
.orb3{width:200px;height:200px;background:rgba(6,182,212,.05);top:50%;left:50%;animation-delay:5s;}
@keyframes orbFloat{0%,100%{transform:translate(0,0);}50%{transform:translate(20px,-20px);}}
.card{background:rgba(11,14,22,.9);backdrop-filter:blur(32px);border:1px solid rgba(120,130,180,.12);border-radius:24px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 32px 96px rgba(0,0,0,.6),0 0 0 1px rgba(124,58,237,.08);position:relative;z-index:1;animation:cardIn .4s cubic-bezier(.4,0,.2,1);}
@keyframes cardIn{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.card-top{padding:40px 36px 32px;text-align:center;border-bottom:1px solid rgba(120,130,180,.1);}
.logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#7c3aed,#5865f2);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px;box-shadow:0 0 0 1px rgba(124,58,237,.3),0 0 24px rgba(124,58,237,.5),0 0 48px rgba(124,58,237,.2);animation:logoPulse 3s ease-in-out infinite;}
@keyframes logoPulse{0%,100%{box-shadow:0 0 0 1px rgba(124,58,237,.3),0 0 24px rgba(124,58,237,.5),0 0 48px rgba(124,58,237,.2);}50%{box-shadow:0 0 0 1px rgba(88,101,242,.4),0 0 32px rgba(88,101,242,.6),0 0 64px rgba(88,101,242,.25);}}
.card-top h1{font-size:24px;font-weight:800;font-family:'Space Grotesk',sans-serif;letter-spacing:-.4px;margin-bottom:6px;}
.card-top p{color:#8892b8;font-size:13px;}
.card-body{padding:32px 36px;}
.discord-btn{width:100%;padding:14px 20px;background:linear-gradient(135deg,#5865f2,#4752c4);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s cubic-bezier(.4,0,.2,1);box-shadow:0 4px 20px rgba(88,101,242,.4);margin-bottom:24px;text-decoration:none;}
.discord-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(88,101,242,.6);}
.discord-btn i{font-size:18px;}
.divider{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(120,130,180,.15);}
.divider span{color:#4a5068;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:11px;font-weight:600;color:#8892b8;text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px;}
.input-wrap{position:relative;}
.input-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#4a5068;font-size:13px;}
.form-input{width:100%;background:rgba(21,25,35,.8);border:1px solid rgba(120,130,180,.12);color:#eceef8;padding:11px 13px 11px 38px;border-radius:10px;font-size:13px;font-family:inherit;transition:all .2s;}
.form-input:focus{outline:none;border-color:#7c3aed;background:rgba(28,33,48,.9);box-shadow:0 0 0 3px rgba(124,58,237,.14);}
.form-input::placeholder{color:#3d4460;}
.submit-btn{width:100%;padding:13px 20px;background:linear-gradient(135deg,#7c3aed,#5865f2);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:all .2s cubic-bezier(.4,0,.2,1);box-shadow:0 4px 20px rgba(124,58,237,.4);margin-top:20px;}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(124,58,237,.6);}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.error-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171;padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;align-items:center;gap:9px;}
.error-box.show{display:flex;animation:shake .4s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.success-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:#34d399;padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;align-items:center;gap:9px;}
.success-box.show{display:flex;}
.card-footer{padding:16px 36px 24px;text-align:center;color:#3d4460;font-size:12px;}
.card-footer a{color:#7c3aed;text-decoration:none;}
.card-footer a:hover{color:#a78bfa;}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="card">
  <div class="card-top">
    <div class="logo">🎮</div>
    <h1>WAN Bot Dashboard</h1>
    <p>Sign in to manage your Discord servers</p>
  </div>
  <div class="card-body">
    <!-- Error / success -->
    <div class="error-box" id="errorBox"><i class="fas fa-exclamation-circle"></i><span id="errorText">Invalid credentials</span></div>
    <div class="success-box" id="successBox"><i class="fas fa-check-circle"></i><span>Redirecting...</span></div>

    <!-- Discord OAuth -->
    <a href="/login/discord" class="discord-btn" id="discordBtn">
      <i class="fab fa-discord"></i> Continue with Discord
    </a>

    <div class="divider"><span>or use admin password</span></div>

    <!-- Password form -->
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" id="username" class="form-input" placeholder="admin" required autocomplete="username">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">
        <i class="fas fa-sign-in-alt"></i> <span id="btnText">Sign In</span>
      </button>
    </form>
  </div>
  <div class="card-footer">
    <p>Discord OAuth is the recommended login method.</p>
    <p style="margin-top:6px;">Need help? <a href="/invite" target="_blank">Invite WAN Bot</a></p>
  </div>
</div>
<script>
// Show error from URL param
const params=new URLSearchParams(location.search);
const errMap={
  invalid_state:'OAuth state mismatch — please try again.',
  no_shared_server:'You must be in a server with WAN Bot to log in.',
  no_permission:'You need Manage Server permission to access the dashboard.',
  not_configured:'Discord OAuth is not configured on this server.',
  oauth_failed:'Discord login failed — please try again.',
  no_token:'Could not get Discord access token.',
};
if(params.get('error')){
  const box=document.getElementById('errorBox');
  document.getElementById('errorText').textContent=errMap[params.get('error')]||'Login failed: '+params.get('error');
  box.classList.add('show');
}

document.getElementById('loginForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const btn=document.getElementById('submitBtn');
  const txt=document.getElementById('btnText');
  const errBox=document.getElementById('errorBox');
  errBox.classList.remove('show');
  btn.disabled=true;
  txt.innerHTML='<span class="spinner"></span>';
  try{
    const r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({username:document.getElementById('username').value,password:document.getElementById('password').value})});
    const d=await r.json();
    if(d.success){
      document.getElementById('successBox').classList.add('show');
      setTimeout(()=>location.href='/',600);
    }else{
      document.getElementById('errorText').textContent=d.error||'Invalid credentials';
      errBox.classList.add('show');
      btn.disabled=false;txt.textContent='Sign In';
    }
  }catch(err){
    document.getElementById('errorText').textContent='Network error — please try again.';
    errBox.classList.add('show');
    btn.disabled=false;txt.textContent='Sign In';
  }
});
</script>
</body>
</html>
