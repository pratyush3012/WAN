<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WAN Music — {{ server_name }}</title>
<link href="https://fonts.googleapis.com/css2?family=YouTube+Sans:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--s1:#1a1a1a;--s2:#212121;--s3:#2a2a2a;--s4:#3a3a3a;
  --text:#fff;--muted:#aaa;--muted2:#717171;
  --accent:#ff0000;--accent2:#ff4444;
  --border:rgba(255,255,255,.1);
  --radius:8px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Roboto',sans-serif}

/* ── LAYOUT ── */
.app{display:grid;grid-template-rows:auto 1fr auto;height:100vh;overflow:hidden}

/* ── TOPBAR ── */
.topbar{height:56px;background:var(--bg);display:flex;align-items:center;padding:0 16px;gap:16px;border-bottom:1px solid var(--border);flex-shrink:0;z-index:100}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text)}
.logo-icon{font-size:22px;color:var(--accent)}
.logo-text{font-size:16px;font-weight:700;letter-spacing:-.3px}
.logo-sub{font-size:11px;color:var(--muted);font-weight:400;margin-left:2px}
.search-wrap{flex:1;max-width:600px;margin:0 auto;display:flex;align-items:center;gap:0}
.search-inp{flex:1;height:38px;background:var(--s2);border:1px solid var(--border);border-right:none;border-radius:20px 0 0 20px;color:var(--text);padding:0 16px;font-size:14px;outline:none;transition:.2s}
.search-inp:focus{border-color:rgba(255,255,255,.3);background:var(--s3)}
.search-inp::placeholder{color:var(--muted2)}
.search-btn{height:38px;width:56px;background:var(--s3);border:1px solid var(--border);border-left:none;border-radius:0 20px 20px 0;color:var(--muted);cursor:pointer;font-size:15px;transition:.2s;display:flex;align-items:center;justify-content:center}
.search-btn:hover{background:var(--s4);color:var(--text)}
.server-chip{display:flex;align-items:center;gap:8px;padding:4px 12px;background:var(--s2);border-radius:20px;font-size:12px;color:var(--muted);border:1px solid var(--border)}
.server-chip img{width:20px;height:20px;border-radius:50%}
.back-btn{color:var(--muted);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:6px;transition:.2s}
.back-btn:hover{background:var(--s2);color:var(--text)}

/* ── MAIN CONTENT ── */
.content{display:grid;grid-template-columns:1fr 340px;overflow:hidden}

/* ── LEFT PANEL ── */
.left-panel{overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:24px}
.left-panel::-webkit-scrollbar{width:6px}
.left-panel::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px}

/* Now Playing Hero */
.now-playing-hero{display:flex;gap:24px;align-items:flex-start;padding:20px;background:linear-gradient(135deg,var(--s2),var(--s3));border-radius:12px;position:relative;overflow:hidden;min-height:180px}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(40px) brightness(.3);transform:scale(1.1);transition:all 1.2s ease;z-index:0}
.hero-content{position:relative;z-index:1;display:flex;gap:20px;align-items:flex-start;width:100%}
.hero-art{width:140px;height:140px;border-radius:8px;object-fit:cover;flex-shrink:0;box-shadow:0 8px 32px rgba(0,0,0,.6);transition:all .6s ease}
.hero-art.transitioning{transform:scale(.92) rotate(-2deg);opacity:.4}
.hero-info{flex:1;min-width:0;padding-top:4px}
.hero-title{font-size:22px;font-weight:700;line-height:1.2;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:all .4s ease}
.hero-artist{font-size:14px;color:var(--muted);margin-bottom:16px}
.hero-idle{font-size:15px;color:var(--muted2);padding:20px 0}

/* Progress */
.progress-section{margin-top:8px}
.progress-bar-wrap{position:relative;height:4px;background:rgba(255,255,255,.15);border-radius:2px;cursor:pointer;margin-bottom:6px;transition:.2s}
.progress-bar-wrap:hover{height:6px}
.progress-fill{height:100%;background:var(--text);border-radius:2px;transition:width .5s linear;position:relative}
.progress-fill::after{content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:12px;height:12px;border-radius:50%;background:#fff;opacity:0;transition:.2s}
.progress-bar-wrap:hover .progress-fill::after{opacity:1}
.time-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted2)}

/* Controls */
.controls-row{display:flex;align-items:center;gap:8px;margin-top:12px}
.ctrl{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:8px;border-radius:50%;transition:.2s;display:flex;align-items:center;justify-content:center;width:38px;height:38px}
.ctrl:hover{color:var(--text);background:rgba(255,255,255,.08)}
.ctrl.active{color:var(--text)}
.ctrl-play{width:48px;height:48px;font-size:22px;background:var(--text);color:var(--bg);border-radius:50%;transition:.2s}
.ctrl-play:hover{transform:scale(1.06);background:#fff}
.vol-wrap{display:flex;align-items:center;gap:6px;margin-left:auto}
.vol-sl{-webkit-appearance:none;width:80px;height:3px;border-radius:2px;background:rgba(255,255,255,.2);outline:none;cursor:pointer}
.vol-sl::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer}

/* Section headers */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:16px;font-weight:700}
.section-link{font-size:12px;color:var(--muted);cursor:pointer;transition:.2s}
.section-link:hover{color:var(--text)}

/* Search results / suggestions grid */
.songs-grid{display:flex;flex-direction:column;gap:2px}
.song-row{display:flex;align-items:center;gap:12px;padding:8px 10px;border-radius:6px;cursor:pointer;transition:.15s;position:relative}
.song-row:hover{background:var(--s2)}
.song-row.playing{background:rgba(255,255,255,.06)}
.song-num{width:20px;text-align:center;font-size:13px;color:var(--muted2);flex-shrink:0}
.song-row.playing .song-num{color:var(--accent)}
.song-thumb{width:44px;height:44px;border-radius:4px;object-fit:cover;flex-shrink:0;background:var(--s3)}
.song-meta{flex:1;min-width:0}
.song-title{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.song-row.playing .song-title{color:var(--accent)}
.song-artist{font-size:12px;color:var(--muted2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.song-dur{font-size:12px;color:var(--muted2);flex-shrink:0}
.song-add{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:14px;padding:4px 8px;border-radius:4px;opacity:0;transition:.2s}
.song-row:hover .song-add{opacity:1}
.song-add:hover{color:var(--text);background:rgba(255,255,255,.1)}

/* Chips */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.chip{padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;transition:.2s;border:1px solid var(--border);background:var(--s2);color:var(--text);font-weight:500}
.chip:hover{background:var(--s3)}
.chip.active{background:var(--text);color:var(--bg);border-color:var(--text)}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--muted2)}
.empty i{font-size:40px;margin-bottom:12px;display:block;opacity:.4}
.empty p{font-size:14px}
</style>

<style>
/* ── RIGHT PANEL (Queue) ── */
.right-panel{border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--s1)}
.queue-header{padding:16px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.queue-title{font-size:14px;font-weight:700;margin-bottom:8px}
.queue-tabs{display:flex;gap:0}
.qtab{flex:1;padding:7px 4px;text-align:center;font-size:12px;font-weight:600;color:var(--muted2);cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.qtab.active{color:var(--text);border-bottom-color:var(--text)}
.queue-list{flex:1;overflow-y:auto;padding:8px 0}
.queue-list::-webkit-scrollbar{width:4px}
.queue-list::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}
.q-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;transition:.15s;position:relative}
.q-item:hover{background:var(--s2)}
.q-item.current{background:rgba(255,255,255,.05)}
.q-thumb{width:40px;height:40px;border-radius:4px;object-fit:cover;flex-shrink:0;background:var(--s3)}
.q-meta{flex:1;min-width:0}
.q-title{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.q-item.current .q-title{color:var(--accent)}
.q-artist{font-size:11px;color:var(--muted2)}
.q-dur{font-size:11px;color:var(--muted2);flex-shrink:0}
.q-remove{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:12px;padding:3px 6px;border-radius:3px;opacity:0;transition:.2s}
.q-item:hover .q-remove{opacity:1}
.q-remove:hover{color:var(--accent);background:rgba(255,0,0,.1)}
.q-empty{text-align:center;padding:30px 16px;color:var(--muted2);font-size:13px}

/* ── BOTTOM BAR ── */
.bottom-bar{height:72px;background:var(--s1);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;z-index:100}
.bb-art{width:48px;height:48px;border-radius:4px;object-fit:cover;flex-shrink:0;background:var(--s3);transition:all .5s ease}
.bb-art.transitioning{transform:scale(.8) rotate(-5deg);opacity:.3}
.bb-info{flex:1;min-width:0}
.bb-title{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:all .4s ease}
.bb-artist{font-size:11px;color:var(--muted2)}
.bb-controls{display:flex;align-items:center;gap:4px}
.bbc{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:7px;border-radius:50%;transition:.2s;display:flex;align-items:center;justify-content:center}
.bbc:hover{color:var(--text);background:rgba(255,255,255,.08)}
.bbc.active{color:var(--text)}
.bbc-play{font-size:20px;color:var(--text);width:40px;height:40px}
.bbc-play:hover{transform:scale(1.08)}
.bb-right{display:flex;align-items:center;gap:8px;min-width:180px;justify-content:flex-end}
.bb-vol{-webkit-appearance:none;width:90px;height:3px;border-radius:2px;background:rgba(255,255,255,.2);outline:none;cursor:pointer}
.bb-vol::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:#fff;cursor:pointer}
.bb-prog{flex:1;height:2px;background:rgba(255,255,255,.15);border-radius:1px;cursor:pointer;position:relative;max-width:400px;margin:0 auto}
.bb-prog-fill{height:100%;background:var(--text);border-radius:1px;transition:width .5s linear}

/* ── SONG TRANSITION OVERLAY ── */
.transition-overlay{position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0;transition:opacity .4s}
.transition-overlay.show{opacity:1}
.transition-art{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.6);width:200px;height:200px;border-radius:16px;object-fit:cover;box-shadow:0 20px 80px rgba(0,0,0,.8);transition:all .6s cubic-bezier(.34,1.56,.64,1)}
.transition-overlay.show .transition-art{transform:translate(-50%,-50%) scale(1)}
.transition-bg{position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(20px)}
.transition-title{position:absolute;top:50%;left:50%;transform:translate(-50%,60px);text-align:center;opacity:0;transition:all .5s .2s}
.transition-overlay.show .transition-title{opacity:1;transform:translate(-50%,80px)}
.transition-title h2{font-size:20px;font-weight:700;margin-bottom:4px}
.transition-title p{font-size:14px;color:var(--muted)}

/* ── TOAST ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:13px;opacity:0;transition:.3s;z-index:9998;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── LOADING SPINNER ── */
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── EQUALIZER BARS (playing indicator) ── */
.eq{display:flex;align-items:flex-end;gap:2px;height:14px;width:14px}
.eq span{width:3px;background:var(--accent);border-radius:1px;animation:eq .8s ease-in-out infinite alternate}
.eq span:nth-child(1){animation-delay:0s;height:6px}
.eq span:nth-child(2){animation-delay:.2s;height:10px}
.eq span:nth-child(3){animation-delay:.4s;height:4px}
@keyframes eq{to{height:14px}}
</style>

</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <a href="/server/{{ server_id }}" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <a href="#" class="logo">
      <span class="logo-icon"><i class="fab fa-youtube"></i></span>
      <span class="logo-text">Music<span class="logo-sub"> WAN</span></span>
    </a>
    <div class="search-wrap">
      <input class="search-inp" id="searchInp" placeholder="Search songs, artists, albums..." onkeydown="if(event.key==='Enter')doSearch()">
      <button class="search-btn" onclick="doSearch()"><i class="fas fa-search"></i></button>
    </div>
    <div class="server-chip">
      {% if server_icon %}<img src="{{ server_icon }}" alt="">{% endif %}
      {{ server_name }}
    </div>
  </div>

  <!-- MAIN -->
  <div class="content">

    <!-- LEFT PANEL -->
    <div class="left-panel" id="leftPanel">

      <!-- Now Playing Hero -->
      <div class="now-playing-hero" id="hero">
        <div class="hero-bg" id="heroBg"></div>
        <div class="hero-content">
          <img class="hero-art" id="heroArt" src="" alt="" onerror="this.src='https://i.imgur.com/placeholder.png'">
          <div class="hero-info">
            <div id="heroIdle" class="hero-idle">
              <i class="fas fa-music" style="font-size:32px;margin-bottom:8px;display:block;opacity:.3"></i>
              Nothing playing — search a song to start
            </div>
            <div id="heroTrack" style="display:none">
              <div class="hero-title" id="heroTitle">—</div>
              <div class="hero-artist" id="heroArtist">—</div>
              <div class="progress-section">
                <div class="progress-bar-wrap" id="progWrap">
                  <div class="progress-fill" id="progFill" style="width:0%"></div>
                </div>
                <div class="time-row">
                  <span id="timeCur">0:00</span>
                  <span id="timeTot">0:00</span>
                </div>
              </div>
              <div class="controls-row">
                <button class="ctrl" id="shuffleBtn" onclick="control('shuffle')" title="Shuffle"><i class="fas fa-random"></i></button>
                <button class="ctrl" onclick="control('skip_back')" title="Previous"><i class="fas fa-step-backward"></i></button>
                <button class="ctrl ctrl-play" id="playBtn" onclick="togglePlay()"><i class="fas fa-play" id="playIcon"></i></button>
                <button class="ctrl" onclick="control('skip')" title="Skip"><i class="fas fa-step-forward"></i></button>
                <button class="ctrl" id="loopBtn" onclick="control('loop')" title="Loop"><i class="fas fa-redo"></i></button>
                <div class="vol-wrap">
                  <i class="fas fa-volume-down" style="font-size:13px;color:var(--muted2)"></i>
                  <input type="range" class="vol-sl" id="volSl" min="0" max="100" value="80" oninput="setVolume(this.value)">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Chips / Filters -->
      <div>
        <div class="chips" id="chips">
          <div class="chip active" onclick="setChip('all',this)">All</div>
          <div class="chip" onclick="setChip('songs',this)">Songs</div>
          <div class="chip" onclick="setChip('hindi',this)">Hindi</div>
          <div class="chip" onclick="setChip('english',this)">English</div>
          <div class="chip" onclick="setChip('trending',this)">Trending</div>
        </div>
      </div>

      <!-- Search Results / Suggestions -->
      <div>
        <div class="section-hdr">
          <span class="section-title" id="sectionTitle">Suggestions</span>
          <span class="section-link" onclick="loadSuggestions()"><i class="fas fa-sync-alt"></i> Refresh</span>
        </div>
        <div class="songs-grid" id="songsGrid">
          <div class="empty"><i class="fas fa-music"></i><p>Search for a song to get started</p></div>
        </div>
      </div>

    </div>

    <!-- RIGHT PANEL (Queue) -->
    <div class="right-panel">
      <div class="queue-header">
        <div class="queue-title">Queue</div>
        <div class="queue-tabs">
          <div class="qtab active" onclick="switchQTab('queue',this)">Up next</div>
          <div class="qtab" onclick="switchQTab('history',this)">History</div>
        </div>
      </div>
      <div class="queue-list" id="queueList">
        <div class="q-empty">Queue is empty</div>
      </div>
    </div>

  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <img class="bb-art" id="bbArt" src="" alt="">
    <div class="bb-info">
      <div class="bb-title" id="bbTitle">—</div>
      <div class="bb-artist" id="bbArtist">—</div>
    </div>
    <div class="bb-prog" id="bbProg">
      <div class="bb-prog-fill" id="bbProgFill" style="width:0%"></div>
    </div>
    <div class="bb-controls">
      <button class="bbc" onclick="control('skip_back')"><i class="fas fa-step-backward"></i></button>
      <button class="bbc bbc-play" id="bbPlayBtn" onclick="togglePlay()"><i class="fas fa-play" id="bbPlayIcon"></i></button>
      <button class="bbc" onclick="control('skip')"><i class="fas fa-step-forward"></i></button>
    </div>
    <div class="bb-right">
      <button class="bbc" id="bbLoopBtn" onclick="control('loop')"><i class="fas fa-redo"></i></button>
      <i class="fas fa-volume-down" style="font-size:13px;color:var(--muted2)"></i>
      <input type="range" class="bb-vol" id="bbVol" min="0" max="100" value="80" oninput="setVolume(this.value)">
    </div>
  </div>

</div>

<!-- Song transition overlay -->
<div class="transition-overlay" id="transOverlay">
  <div class="transition-bg"></div>
  <img class="transition-art" id="transArt" src="" alt="">
  <div class="transition-title">
    <h2 id="transTitle"></h2>
    <p id="transArtist"></p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SERVER_ID = "{{ server_id }}";
const API = (path, method='GET', body=null) => fetch(`/api/server/${SERVER_ID}${path}`, {
  method, headers: body ? {'Content-Type':'application/json'} : {},
  body: body ? JSON.stringify(body) : null
}).then(r => r.json());

let state = { playing: false, paused: false, current: null, loop: false, volume: 80 };
let elapsed = 0, duration = 0, progressTimer = null;
let lastTitle = null, activeChip = 'all';

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ── FORMAT TIME ───────────────────────────────────────────────────────────────
function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return `${m}:${String(sec).padStart(2,'0')}`;
}

// ── APPLE MUSIC AUDIO CROSSFADE ───────────────────────────────────────────────
// Simulates the Apple Music volume duck: fade out → show transition → fade in
let crossfadeActive = false;
let targetVolume = 80;

async function appleMusicCrossfade(title, artist, thumb, onMidpoint) {
  if (crossfadeActive) return;
  crossfadeActive = true;
  targetVolume = parseInt(document.getElementById('volSl').value) || 80;

  // Phase 1: Fade volume down (400ms)
  await fadeVolume(targetVolume, 0, 400);

  // Phase 2: Show visual transition + swap art
  const ov = document.getElementById('transOverlay');
  const art = document.getElementById('transArt');
  document.getElementById('transTitle').textContent = title;
  document.getElementById('transArtist').textContent = artist;
  art.src = thumb || '';
  ov.classList.add('show');

  if (onMidpoint) onMidpoint();

  // Phase 3: Hold for 1.2s
  await sleep(1200);

  // Phase 4: Fade volume back up (600ms)
  await fadeVolume(0, targetVolume, 600);

  // Phase 5: Hide overlay
  ov.classList.remove('show');
  crossfadeActive = false;
}

function fadeVolume(from, to, durationMs) {
  return new Promise(resolve => {
    const steps = 30;
    const stepTime = durationMs / steps;
    const delta = (to - from) / steps;
    let current = from;
    let step = 0;
    const interval = setInterval(() => {
      current += delta;
      step++;
      const clamped = Math.max(0, Math.min(100, Math.round(current)));
      document.getElementById('volSl').value = clamped;
      document.getElementById('bbVol').value = clamped;
      // Tell the bot to adjust volume
      if (step % 5 === 0) {
        API('/music/control', 'POST', { action: 'volume', value: clamped }).catch(() => {});
      }
      if (step >= steps) {
        clearInterval(interval);
        resolve();
      }
    }, stepTime);
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── SONG TRANSITION (visual only, called when no audio crossfade) ─────────────
function playTransition(title, artist, thumb) {
  const ov = document.getElementById('transOverlay');
  const art = document.getElementById('transArt');
  document.getElementById('transTitle').textContent = title;
  document.getElementById('transArtist').textContent = artist;
  art.src = thumb || '';
  ov.classList.add('show');
  setTimeout(() => ov.classList.remove('show'), 2200);
}

// ── UPDATE UI ─────────────────────────────────────────────────────────────────
function updateUI(data) {
  const wasTitle = lastTitle;
  const cur = data.current;
  state.playing = data.playing && !data.paused;
  state.paused = data.paused;
  state.loop = data.loop;
  state.volume = data.volume;

  // Sync volume sliders (only if not in crossfade)
  if (!crossfadeActive) {
    document.getElementById('volSl').value = data.volume;
    document.getElementById('bbVol').value = data.volume;
    targetVolume = data.volume;
  }

  // Loop button state
  document.getElementById('loopBtn').classList.toggle('active', data.loop);
  document.getElementById('bbLoopBtn').classList.toggle('active', data.loop);

  // Play/pause icons
  const icon = data.playing && !data.paused ? 'fa-pause' : 'fa-play';
  document.getElementById('playIcon').className = `fas ${icon}`;
  document.getElementById('bbPlayIcon').className = `fas ${icon}`;

  if (!cur) {
    document.getElementById('heroIdle').style.display = 'block';
    document.getElementById('heroTrack').style.display = 'none';
    document.getElementById('heroArt').src = '';
    document.getElementById('heroBg').style.backgroundImage = '';
    document.getElementById('bbTitle').textContent = '—';
    document.getElementById('bbArtist').textContent = '—';
    document.getElementById('bbArt').src = '';
    document.getElementById('bbProgFill').style.width = '0%';
    clearInterval(progressTimer);
    lastTitle = null;
    return;
  }

  // Song changed — Apple Music crossfade
  if (cur.title !== wasTitle && wasTitle !== null) {
    appleMusicCrossfade(cur.title, cur.uploader || cur.requester, cur.thumbnail, () => {
      // Swap art at midpoint
      const heroArt = document.getElementById('heroArt');
      const bbArt = document.getElementById('bbArt');
      heroArt.classList.add('transitioning');
      bbArt.classList.add('transitioning');
      setTimeout(() => {
        heroArt.src = cur.thumbnail || '';
        bbArt.src = cur.thumbnail || '';
        heroArt.classList.remove('transitioning');
        bbArt.classList.remove('transitioning');
        document.getElementById('heroBg').style.backgroundImage = `url('${cur.thumbnail}')`;
      }, 300);
    });
  } else if (cur.title !== wasTitle) {
    // First song — no crossfade, just set
    document.getElementById('heroArt').src = cur.thumbnail || '';
    document.getElementById('bbArt').src = cur.thumbnail || '';
    document.getElementById('heroBg').style.backgroundImage = `url('${cur.thumbnail}')`;
  }

  lastTitle = cur.title;
  document.getElementById('heroIdle').style.display = 'none';
  document.getElementById('heroTrack').style.display = 'block';
  document.getElementById('heroTitle').textContent = cur.title;
  document.getElementById('heroArtist').textContent = cur.uploader || cur.requester || '—';
  document.getElementById('bbTitle').textContent = cur.title;
  document.getElementById('bbArtist').textContent = cur.uploader || cur.requester || '—';
  document.getElementById('timeTot').textContent = cur.duration || '—';
}

// ── POLL STATUS ───────────────────────────────────────────────────────────────
async function pollStatus() {
  try {
    const data = await API('/music/status');
    updateUI(data);
    renderQueue();
  } catch(e) {}
}

// ── RENDER QUEUE ──────────────────────────────────────────────────────────────
async function renderQueue() {
  try {
    const data = await API('/music/queue');
    const list = document.getElementById('queueList');
    if (!data.queue || !data.queue.length) {
      list.innerHTML = '<div class="q-empty">Queue is empty</div>';
      return;
    }
    list.innerHTML = data.queue.map((s, i) => `
      <div class="q-item" onclick="playFromQueue(${s.index})">
        <img class="q-thumb" src="${s.thumbnail||''}" alt="" onerror="this.style.display='none'">
        <div class="q-meta">
          <div class="q-title">${esc(s.title)}</div>
          <div class="q-artist">${esc(s.uploader)} • ${s.requester}</div>
        </div>
        <span class="q-dur">${s.duration}</span>
        <button class="q-remove" onclick="event.stopPropagation();removeFromQueue(${s.index})" title="Remove">✕</button>
      </div>`).join('');
  } catch(e) {}
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
async function doSearch() {
  const q = document.getElementById('searchInp').value.trim();
  if (!q) return;
  document.getElementById('sectionTitle').textContent = `Results for "${q}"`;
  const grid = document.getElementById('songsGrid');
  grid.innerHTML = `<div style="padding:20px;text-align:center"><div class="spin"></div></div>`;
  try {
    const data = await API('/music/search', 'POST', { query: q });
    if (!data.results || !data.results.length) {
      grid.innerHTML = '<div class="empty"><i class="fas fa-search"></i><p>No results found</p></div>';
      return;
    }
    renderSongs(data.results);
  } catch(e) {
    grid.innerHTML = '<div class="empty"><i class="fas fa-exclamation-circle"></i><p>Search failed</p></div>';
  }
}

function renderSongs(songs) {
  const grid = document.getElementById('songsGrid');
  grid.innerHTML = songs.map((s, i) => `
    <div class="song-row" onclick="playSong('${esc(s.url||s.title)}','${esc(s.title)}')">
      <span class="song-num">${i+1}</span>
      <img class="song-thumb" src="${s.thumbnail||''}" alt="" onerror="this.style.display='none'">
      <div class="song-meta">
        <div class="song-title">${esc(s.title)}</div>
        <div class="song-artist">${esc(s.uploader)} • ${fmt(s.duration)}</div>
      </div>
      <span class="song-dur">${fmt(s.duration)}</span>
      <button class="song-add" onclick="event.stopPropagation();addToQueue('${esc(s.url||s.title)}','${esc(s.title)}')" title="Add to queue"><i class="fas fa-plus"></i></button>
    </div>`).join('');
}

// ── SUGGESTIONS ───────────────────────────────────────────────────────────────
const SUGGESTIONS = {
  all: ['Arijit Singh hits', 'Top Bollywood 2024', 'English pop hits', 'Lo-fi chill beats', 'Trending songs'],
  hindi: ['Arijit Singh', 'Jubin Nautiyal', 'Atif Aslam', 'Shreya Ghoshal', 'Bollywood 2024'],
  english: ['Taylor Swift', 'The Weeknd', 'Ed Sheeran', 'Billie Eilish', 'Pop hits 2024'],
  songs: ['Top 50 global', 'Viral hits', 'New releases', 'Party mix', 'Workout playlist'],
  trending: ['Trending India', 'Viral reels songs', 'Top charts 2024', 'New Bollywood', 'Global top 50'],
};

async function loadSuggestions() {
  const queries = SUGGESTIONS[activeChip] || SUGGESTIONS.all;
  const q = queries[Math.floor(Math.random() * queries.length)];
  document.getElementById('sectionTitle').textContent = `Suggested: ${q}`;
  document.getElementById('searchInp').value = q;
  const grid = document.getElementById('songsGrid');
  grid.innerHTML = `<div style="padding:20px;text-align:center"><div class="spin"></div></div>`;
  try {
    const data = await API('/music/search', 'POST', { query: q });
    if (data.results && data.results.length) renderSongs(data.results);
    else grid.innerHTML = '<div class="empty"><i class="fas fa-music"></i><p>No suggestions found</p></div>';
  } catch(e) {
    grid.innerHTML = '<div class="empty"><i class="fas fa-music"></i><p>Could not load suggestions</p></div>';
  }
}

function setChip(name, el) {
  activeChip = name;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  loadSuggestions();
}

// ── CONTROLS ──────────────────────────────────────────────────────────────────
async function togglePlay() {
  const action = (state.playing && !state.paused) ? 'pause' : 'resume';
  await API('/music/control', 'POST', { action });
  pollStatus();
}

async function control(action) {
  await API('/music/control', 'POST', { action });
  setTimeout(pollStatus, 300);
}

async function setVolume(v) {
  document.getElementById('volSl').value = v;
  document.getElementById('bbVol').value = v;
  await API('/music/control', 'POST', { action: 'volume', value: parseInt(v) });
}

async function playSong(query, title) {
  toast(`▶️ Playing: ${title}`);
  await API('/music/play', 'POST', { query });
  setTimeout(pollStatus, 1000);
}

async function addToQueue(query, title) {
  toast(`➕ Added: ${title}`);
  await API('/music/play', 'POST', { query });
  setTimeout(renderQueue, 800);
}

async function removeFromQueue(index) {
  await API('/music/control', 'POST', { action: 'remove', index });
  setTimeout(renderQueue, 300);
}

async function playFromQueue(index) {
  // Skip to that position by removing songs before it
  for (let i = 0; i < index - 1; i++) {
    await API('/music/control', 'POST', { action: 'remove', index: 1 });
  }
  await API('/music/control', 'POST', { action: 'skip' });
  setTimeout(pollStatus, 500);
}

function switchQTab(name, el) {
  document.querySelectorAll('.qtab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function esc(s) { const d = document.createElement('div'); d.textContent = String(s||''); return d.innerHTML; }

// ── INIT ──────────────────────────────────────────────────────────────────────
pollStatus();
loadSuggestions();
setInterval(pollStatus, 3000);
setInterval(renderQueue, 5000);
</script>
