<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Premium Watch Party — WAN Bot</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0e27;--surface:#1a1f3a;--surface-light:#252d4a;
    --accent:#00d4ff;--accent-dark:#0099cc;--text:#e2e8f0;
    --muted:#8892a4;--danger:#ff4757;--success:#2ed573;
    --warning:#ffa502;--info:#0984e3;
  }
  
  body{
    background:linear-gradient(135deg, var(--bg) 0%, #1a1f3a 100%);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
    overflow:hidden;
  }
  
  .container{
    display:grid;
    grid-template-columns:1fr 350px;
    gap:16px;
    padding:16px;
    height:100vh;
  }
  
  /* ── Player Section ────────────────────────────────────────────────────── */
  
  .player-section{
    display:flex;
    flex-direction:column;
    gap:12px;
    overflow:hidden;
  }
  
  .player-container{
    position:relative;
    background:var(--surface);
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,212,255,.15);
    flex:1;
    display:flex;
    flex-direction:column;
  }
  
  .video-wrapper{
    position:relative;
    width:100%;
    flex:1;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  
  .video-wrapper video{
    width:100%;
    height:100%;
    object-fit:contain;
  }
  
  .video-overlay{
    position:absolute;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:rgba(0,0,0,.3);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    transition:.3s;
  }
  
  .video-wrapper:hover .video-overlay{
    opacity:1;
  }
  
  .play-button{
    width:80px;
    height:80px;
    border-radius:50%;
    background:rgba(0,212,255,.9);
    border:none;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    color:#000;
    transition:.3s;
  }
  
  .play-button:hover{
    transform:scale(1.1);
    background:var(--accent);
  }
  
  .video-info{
    padding:16px;
    background:var(--surface-light);
    border-top:1px solid rgba(0,212,255,.1);
  }
  
  .video-title{
    font-size:18px;
    font-weight:700;
    margin-bottom:8px;
    background:linear-gradient(135deg, var(--accent), #00ffff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  
  .video-meta{
    display:flex;
    gap:16px;
    font-size:12px;
    color:var(--muted);
  }
  
  .meta-item{
    display:flex;
    align-items:center;
    gap:4px;
  }
  
  /* ── Controls ──────────────────────────────────────────────────────────── */
  
  .controls{
    padding:12px 16px;
    background:var(--surface-light);
    border-radius:12px;
    display:flex;
    gap:8px;
    align-items:center;
  }
  
  .progress-bar{
    flex:1;
    height:6px;
    background:rgba(0,212,255,.1);
    border-radius:3px;
    cursor:pointer;
    position:relative;
    overflow:hidden;
  }
  
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--accent), #00ffff);
    width:0%;
    border-radius:3px;
    box-shadow:0 0 10px rgba(0,212,255,.5);
  }
  
  .time-display{
    font-size:12px;
    color:var(--muted);
    min-width:80px;
    text-align:right;
  }
  
  .control-buttons{
    display:flex;
    gap:8px;
  }
  
  .control-btn{
    width:36px;
    height:36px;
    border-radius:8px;
    border:none;
    background:rgba(0,212,255,.1);
    color:var(--accent);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:.3s;
    font-size:14px;
  }
  
  .control-btn:hover{
    background:rgba(0,212,255,.2);
    transform:scale(1.05);
  }
  
  .control-btn.active{
    background:var(--accent);
    color:#000;
  }
  
  /* ── Schedule Section ──────────────────────────────────────────────────── */
  
  .schedule-section{
    background:var(--surface);
    border-radius:12px;
    padding:12px;
    border:1px solid rgba(0,212,255,.1);
  }
  
  .schedule-title{
    font-size:12px;
    font-weight:700;
    color:var(--accent);
    margin-bottom:8px;
    text-transform:uppercase;
    letter-spacing:1px;
  }
  
  .schedule-time{
    font-size:14px;
    color:var(--text);
    margin-bottom:4px;
  }
  
  .schedule-input{
    width:100%;
    padding:8px;
    background:rgba(0,212,255,.05);
    border:1px solid rgba(0,212,255,.2);
    border-radius:6px;
    color:var(--text);
    font-size:12px;
    margin-top:8px;
  }
  
  .schedule-input:focus{
    outline:none;
    border-color:var(--accent);
    background:rgba(0,212,255,.1);
  }
  
  /* ── Sidebar ───────────────────────────────────────────────────────────── */
  
  .sidebar{
    display:flex;
    flex-direction:column;
    gap:12px;
    overflow:hidden;
  }
  
  .panel{
    background:var(--surface);
    border-radius:12px;
    border:1px solid rgba(0,212,255,.1);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    flex:1;
    min-height:0;
  }
  
  .panel-header{
    padding:12px;
    background:var(--surface-light);
    border-bottom:1px solid rgba(0,212,255,.1);
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:700;
    font-size:13px;
    color:var(--accent);
    text-transform:uppercase;
    letter-spacing:1px;
  }
  
  .panel-content{
    flex:1;
    overflow-y:auto;
    padding:12px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  
  /* ── Chat ──────────────────────────────────────────────────────────────── */
  
  .chat-message{
    padding:8px;
    background:rgba(0,212,255,.05);
    border-radius:6px;
    border-left:3px solid var(--accent);
    font-size:12px;
    animation:slideIn .3s ease-out;
  }
  
  @keyframes slideIn{
    from{
      opacity:0;
      transform:translateY(10px);
    }
    to{
      opacity:1;
      transform:translateY(0);
    }
  }
  
  .chat-message.owner{
    border-left-color:#ffd700;
    background:rgba(255,215,0,.1);
  }
  
  .chat-message.admin{
    border-left-color:#ff4757;
    background:rgba(255,71,87,.1);
  }
  
  .chat-message.moderator{
    border-left-color:#2ed573;
    background:rgba(46,213,115,.1);
  }
  
  .chat-username{
    font-weight:700;
    color:var(--accent);
    font-size:11px;
  }
  
  .chat-username.owner{
    color:#ffd700;
  }
  
  .chat-username.admin{
    color:#ff4757;
  }
  
  .chat-username.moderator{
    color:#2ed573;
  }
  
  .chat-text{
    color:var(--text);
    margin-top:4px;
    word-break:break-word;
  }
  
  .chat-input-wrapper{
    padding:12px;
    border-top:1px solid rgba(0,212,255,.1);
    display:flex;
    gap:8px;
  }
  
  .chat-input{
    flex:1;
    padding:8px 12px;
    background:rgba(0,212,255,.05);
    border:1px solid rgba(0,212,255,.2);
    border-radius:6px;
    color:var(--text);
    font-size:12px;
  }
  
  .chat-input:focus{
    outline:none;
    border-color:var(--accent);
    background:rgba(0,212,255,.1);
  }
  
  .chat-send{
    width:32px;
    height:32px;
    border-radius:6px;
    background:var(--accent);
    border:none;
    color:#000;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:.3s;
  }
  
  .chat-send:hover{
    transform:scale(1.05);
  }
  
  /* ── Requests ──────────────────────────────────────────────────────────── */
  
  .request-item{
    padding:8px;
    background:rgba(0,212,255,.05);
    border-radius:6px;
    border-left:3px solid var(--warning);
    font-size:11px;
    animation:slideIn .3s ease-out;
  }
  
  .request-user{
    font-weight:700;
    color:var(--accent);
  }
  
  .request-type{
    color:var(--warning);
    font-weight:600;
    margin-top:2px;
  }
  
  .request-actions{
    display:flex;
    gap:4px;
    margin-top:6px;
  }
  
  .request-btn{
    flex:1;
    padding:4px;
    border:none;
    border-radius:4px;
    font-size:10px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
  }
  
  .request-approve{
    background:var(--success);
    color:#000;
  }
  
  .request-approve:hover{
    transform:scale(1.05);
  }
  
  .request-reject{
    background:var(--danger);
    color:#fff;
  }
  
  .request-reject:hover{
    transform:scale(1.05);
  }
  
  /* ── Viewers ───────────────────────────────────────────────────────────── */
  
  .viewer-item{
    padding:8px;
    background:rgba(0,212,255,.05);
    border-radius:6px;
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
  }
  
  .viewer-avatar{
    width:24px;
    height:24px;
    border-radius:50%;
    background:linear-gradient(135deg, var(--accent), #00ffff);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#000;
    font-weight:700;
    font-size:10px;
  }
  
  .viewer-name{
    flex:1;
    color:var(--text);
  }
  
  .viewer-role{
    font-size:10px;
    color:var(--muted);
    background:rgba(0,212,255,.1);
    padding:2px 6px;
    border-radius:3px;
  }
  
  /* ── Scrollbar ─────────────────────────────────────────────────────────── */
  
  ::-webkit-scrollbar{
    width:6px;
  }
  
  ::-webkit-scrollbar-track{
    background:rgba(0,212,255,.05);
  }
  
  ::-webkit-scrollbar-thumb{
    background:rgba(0,212,255,.3);
    border-radius:3px;
  }
  
  ::-webkit-scrollbar-thumb:hover{
    background:rgba(0,212,255,.5);
  }
  
  /* ── Responsive ────────────────────────────────────────────────────────── */
  
  @media(max-width:1024px){
    .container{
      grid-template-columns:1fr;
    }
    
    .sidebar{
      display:none;
    }
  }
</style>
</head>
<body>

<div class="container">
  <!-- Player Section -->
  <div class="player-section">
    <!-- Video Player -->
    <div class="player-container">
      <div class="video-wrapper" id="videoWrapper">
        <video id="videoPlayer" controls></video>
        <div class="video-overlay">
          <button class="play-button" onclick="togglePlay()">
            <i class="fas fa-play"></i>
          </button>
        </div>
      </div>
      
      <div class="video-info">
        <div class="video-title" id="videoTitle">Loading...</div>
        <div class="video-meta">
          <div class="meta-item">
            <i class="fas fa-users"></i>
            <span id="viewerCount">0</span> watching
          </div>
          <div class="meta-item">
            <i class="fas fa-comments"></i>
            <span id="messageCount">0</span> messages
          </div>
          <div class="meta-item">
            <i class="fas fa-clock"></i>
            <span id="duration">00:00</span>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Controls -->
    <div class="controls">
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="time-display" id="timeDisplay">0:00 / 0:00</div>
      <div class="control-buttons">
        <button class="control-btn" onclick="togglePlay()" title="Play/Pause">
          <i class="fas fa-play"></i>
        </button>
        <button class="control-btn" onclick="requestAction('skip')" title="Request Skip">
          <i class="fas fa-forward"></i>
        </button>
        <button class="control-btn" onclick="toggleFullscreen()" title="Fullscreen">
          <i class="fas fa-expand"></i>
        </button>
      </div>
    </div>
    
    <!-- Schedule -->
    <div class="schedule-section">
      <div class="schedule-title">📅 Schedule</div>
      <div class="schedule-time" id="scheduleTime">No schedule set</div>
      <input type="datetime-local" class="schedule-input" id="scheduleInput" onchange="setSchedule()">
    </div>
  </div>
  
  <!-- Sidebar -->
  <div class="sidebar">
    <!-- Chat Panel -->
    <div class="panel">
      <div class="panel-header">
        <i class="fas fa-comments"></i> Live Chat
      </div>
      <div class="panel-content" id="chatMessages"></div>
      <div class="chat-input-wrapper">
        <input type="text" class="chat-input" id="chatInput" placeholder="Say something..." onkeypress="handleChatKeypress(event)">
        <button class="chat-send" onclick="sendMessage()">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>
    
    <!-- Requests Panel -->
    <div class="panel">
      <div class="panel-header">
        <i class="fas fa-list"></i> Requests
      </div>
      <div class="panel-content" id="requestsList">
        <div style="color:var(--muted);font-size:12px;text-align:center;padding:20px;">
          No pending requests
        </div>
      </div>
    </div>
    
    <!-- Viewers Panel -->
    <div class="panel">
      <div class="panel-header">
        <i class="fas fa-users"></i> Viewers
      </div>
      <div class="panel-content" id="viewersList"></div>
    </div>
  </div>
</div>

<script>
const roomId = new URLSearchParams(window.location.search).get('room_id');
const userId = new URLSearchParams(window.location.search).get('user_id');
const userName = new URLSearchParams(window.location.search).get('user_name');
const userRole = new URLSearchParams(window.location.search).get('user_role') || 'member';

let messageCount = 0;
let viewerCount = 0;

// ── Video Controls ────────────────────────────────────────────────────────

function togglePlay(){
  const video = document.getElementById('videoPlayer');
  if(video.paused){
    video.play();
  } else {
    video.pause();
  }
}

function toggleFullscreen(){
  const video = document.getElementById('videoPlayer');
  if(video.requestFullscreen){
    video.requestFullscreen();
  }
}

function formatTime(seconds){
  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

// ── Chat ───────────────────────────────────────────────────────────────────

function sendMessage(){
  const input = document.getElementById('chatInput');
  const message = input.value.trim();
  
  if(!message) return;
  
  // Check if user has permission
  if(userRole === 'guest'){
    alert('Guests cannot send messages. You need a role to chat.');
    return;
  }
  
  // Send to server
  fetch(`/api/watch/chat/${roomId}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      user_id: userId,
      username: userName,
      message: message,
      user_role: userRole
    })
  }).then(r => r.json()).then(data => {
    if(data.success){
      input.value = '';
      addChatMessage(data.message);
    }
  });
}

function handleChatKeypress(event){
  if(event.key === 'Enter'){
    sendMessage();
  }
}

function addChatMessage(msg){
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `chat-message ${msg.role}`;
  div.innerHTML = `
    <div class="chat-username ${msg.role}">${msg.username}</div>
    <div class="chat-text">${escapeHtml(msg.message)}</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  messageCount++;
  document.getElementById('messageCount').textContent = messageCount;
}

// ── Requests ───────────────────────────────────────────────────────────────

function requestAction(type){
  if(userRole === 'guest'){
    alert('Guests cannot make requests. You need a role.');
    return;
  }
  
  fetch(`/api/watch/request/${roomId}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      user_id: userId,
      username: userName,
      request_type: type
    })
  }).then(r => r.json()).then(data => {
    if(data.success){
      alert(`Request sent: ${type}`);
    }
  });
}

function approveRequest(requestId){
  fetch(`/api/watch/request/${roomId}/${requestId}/approve`, {
    method: 'POST'
  }).then(r => r.json()).then(data => {
    if(data.success){
      loadRequests();
    }
  });
}

function rejectRequest(requestId){
  fetch(`/api/watch/request/${roomId}/${requestId}/reject`, {
    method: 'POST'
  }).then(r => r.json()).then(data => {
    if(data.success){
      loadRequests();
    }
  });
}

function loadRequests(){
  fetch(`/api/watch/requests/${roomId}`)
    .then(r => r.json())
    .then(data => {
      const container = document.getElementById('requestsList');
      
      if(!data.requests || data.requests.length === 0){
        container.innerHTML = '<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px;">No pending requests</div>';
        return;
      }
      
      container.innerHTML = data.requests.map(req => `
        <div class="request-item">
          <div class="request-user">${req.username}</div>
          <div class="request-type">Requested: ${req.type}</div>
          ${userRole === 'owner' || userRole === 'admin' ? `
            <div class="request-actions">
              <button class="request-btn request-approve" onclick="approveRequest('${req.id}')">
                <i class="fas fa-check"></i> Approve
              </button>
              <button class="request-btn request-reject" onclick="rejectRequest('${req.id}')">
                <i class="fas fa-times"></i> Reject
              </button>
            </div>
          ` : ''}
        </div>
      `).join('');
    });
}

// ── Viewers ────────────────────────────────────────────────────────────────

function loadViewers(){
  fetch(`/api/watch/viewers/${roomId}`)
    .then(r => r.json())
    .then(data => {
      const container = document.getElementById('viewersList');
      viewerCount = data.viewers ? data.viewers.length : 0;
      document.getElementById('viewerCount').textContent = viewerCount;
      
      container.innerHTML = (data.viewers || []).map(viewer => `
        <div class="viewer-item">
          <div class="viewer-avatar">${viewer.username.charAt(0).toUpperCase()}</div>
          <div class="viewer-name">${viewer.username}</div>
          <div class="viewer-role">${viewer.role}</div>
        </div>
      `).join('');
    });
}

// ── Schedule ───────────────────────────────────────────────────────────────

function setSchedule(){
  const input = document.getElementById('scheduleInput');
  const time = input.value;
  
  if(!time) return;
  
  fetch(`/api/watch/schedule/${roomId}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({start_time: time})
  }).then(r => r.json()).then(data => {
    if(data.success){
      document.getElementById('scheduleTime').textContent = `Scheduled for: ${new Date(time).toLocaleString()}`;
    }
  });
}

// ── Utilities ──────────────────────────────────────────────────────────────

function escapeHtml(text){
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ── Initialize ─────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  // Load initial data
  loadRequests();
  loadViewers();
  
  // Refresh every 2 seconds
  setInterval(() => {
    loadRequests();
    loadViewers();
  }, 2000);
  
  // Update progress bar
  const video = document.getElementById('videoPlayer');
  video.addEventListener('timeupdate', () => {
    const percent = (video.currentTime / video.duration) * 100;
    document.getElementById('progressFill').style.width = percent + '%';
    document.getElementById('timeDisplay').textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
  });
  
  // Click progress bar to seek
  document.getElementById('progressBar').addEventListener('click', (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const percent = (e.clientX - rect.left) / rect.width;
    video.currentTime = percent * video.duration;
  });
});
</script>

</body>
</html>
