<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ room.title }} — Watch Party</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c14;--s1:#0f1220;--s2:#151929;--s3:#1c2035;
  --accent:#7c6fff;--a2:#00e5ff;--gold:#ffd700;
  --red:#ff4757;--green:#2ed573;
  --text:#eef0ff;--muted:#5a6080;--border:rgba(124,111,255,.15);
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;flex-direction:column}
.topbar{height:48px;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:20}
.t-logo{font-size:20px}
.t-title{font-weight:800;font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:linear-gradient(90deg,#fff 30%,var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.pill{display:flex;align-items:center;gap:5px;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700}
.pill-live{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);color:var(--red)}
.pill-viewers{background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.2);color:var(--a2)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.tbtn{height:30px;padding:0 12px;border-radius:7px;border:none;cursor:pointer;font-size:11px;font-weight:700;transition:.2s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.tbtn-ghost{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}
.tbtn-ghost:hover{background:rgba(255,255,255,.1);color:var(--text)}
.tbtn-danger{background:rgba(255,71,87,.15);border:1px solid rgba(255,71,87,.3);color:var(--red)}
.tbtn-danger:hover{background:rgba(255,71,87,.25)}
.main{display:flex;flex:1;overflow:hidden}
.video-side{flex:1;display:flex;flex-direction:column;min-width:0}
.video-wrap{position:relative;flex:1;background:#000;overflow:hidden;cursor:pointer}
#vid{width:100%;height:100%;object-fit:contain;display:block;background:#000}
#vid::-webkit-media-controls{display:none!important}
#vid::-webkit-media-controls-enclosure{display:none!important}
.vg-bot{position:absolute;bottom:0;left:0;right:0;height:140px;background:linear-gradient(to top,rgba(0,0,0,.9),transparent);pointer-events:none;opacity:0;transition:.3s;z-index:3}
.video-wrap:hover .vg-bot,.video-wrap.paused .vg-bot{opacity:1}
.center-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);width:72px;height:72px;border-radius:50%;background:rgba(124,111,255,.85);display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;opacity:0;transition:.25s;pointer-events:none;z-index:6;box-shadow:0 0 40px rgba(124,111,255,.4)}
.video-wrap:hover .center-play,.video-wrap.paused .center-play{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto}
.role-badge{position:absolute;top:12px;left:12px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;backdrop-filter:blur(8px);border:1px solid;display:none;z-index:5}
.rb-host,.rb-owner{background:rgba(255,215,0,.14);border-color:rgba(255,215,0,.4);color:var(--gold)}
.rb-admin{background:rgba(255,71,87,.12);border-color:rgba(255,71,87,.35);color:var(--red)}
.rb-mod{background:rgba(46,213,115,.1);border-color:rgba(46,213,115,.3);color:var(--green)}
.rb-member{background:rgba(0,229,255,.09);border-color:rgba(0,229,255,.25);color:var(--a2)}
.sync-toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);border:1px solid var(--accent);border-radius:12px;padding:10px 22px;font-size:13px;color:var(--a2);display:none;pointer-events:none;z-index:10}
.controls{position:absolute;bottom:0;left:0;right:0;padding:0 12px 10px;opacity:0;transition:.3s;pointer-events:none;z-index:7}
.video-wrap:hover .controls,.video-wrap.paused .controls{opacity:1;pointer-events:auto}
.prog-wrap{padding:8px 0;cursor:pointer}
.prog-track{height:3px;background:rgba(255,255,255,.15);border-radius:3px;position:relative;transition:.2s}
.prog-wrap:hover .prog-track{height:5px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--a2));border-radius:3px;position:relative;transition:width .1s linear}
.prog-fill::after{content:'';position:absolute;right:-6px;top:50%;transform:translateY(-50%);width:12px;height:12px;border-radius:50%;background:#fff;box-shadow:0 0 8px rgba(124,111,255,.9);opacity:0;transition:.2s}
.prog-wrap:hover .prog-fill::after{opacity:1}
.ctrl-row{display:flex;align-items:center;gap:6px}
.cbtn{background:none;border:none;color:rgba(255,255,255,.8);font-size:15px;cursor:pointer;padding:5px 7px;border-radius:6px;transition:.2s;display:flex;align-items:center;justify-content:center;min-width:30px}
.cbtn:hover{color:#fff;background:rgba(255,255,255,.1);transform:scale(1.1)}
.time-txt{font-size:11px;color:rgba(255,255,255,.6);font-variant-numeric:tabular-nums;min-width:95px;font-weight:600}
.vol-wrap{display:flex;align-items:center;gap:5px}
.vol-sl{-webkit-appearance:none;width:65px;height:3px;border-radius:2px;background:rgba(255,255,255,.2);outline:none;cursor:pointer}
.vol-sl::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:#fff;cursor:pointer}
.speed-btn{font-size:10px;font-weight:800;min-width:32px;padding:4px 6px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:5px;color:rgba(255,255,255,.7)}
.speed-btn:hover{background:rgba(124,111,255,.25);color:#fff;border-color:var(--accent)}
.spacer{flex:1}
.chat-side{width:320px;display:flex;flex-direction:column;background:rgba(8,10,20,.7);backdrop-filter:blur(24px);border-left:1px solid rgba(255,255,255,.07);flex-shrink:0;z-index:10}
.ctabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.ctab{flex:1;padding:9px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.2s;text-transform:uppercase;letter-spacing:.4px}
.ctab.active{color:var(--a2);border-bottom-color:var(--a2)}
.ctab:hover:not(.active){color:var(--text)}
.tab-pane{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.tab-pane.active{display:flex}
.vstrip{padding:6px 10px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:4px;max-height:48px;overflow-y:auto;flex-shrink:0}
.vchip{display:flex;align-items:center;gap:3px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:20px;padding:2px 7px;font-size:10px}
.vdot{width:5px;height:5px;border-radius:50%;background:var(--green)}
.chat-msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:5px;scroll-behavior:smooth}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-thumb{background:rgba(124,111,255,.25);border-radius:2px}
.cmsg{display:flex;gap:8px;align-items:flex-start;animation:msgIn .2s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.cmsg-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;overflow:hidden;border:2px solid transparent}
.cmsg-av img{width:100%;height:100%;object-fit:cover}
.av-host,.av-owner{border-color:var(--gold);background:linear-gradient(135deg,#8b6914,var(--gold));color:#000}
.av-admin{border-color:var(--red);background:linear-gradient(135deg,#8b1a1a,var(--red));color:#fff}
.av-mod{border-color:var(--green);background:linear-gradient(135deg,#1a6b3a,var(--green));color:#000}
.av-member{border-color:var(--a2);background:linear-gradient(135deg,#006080,var(--a2));color:#000}
.av-guest{border-color:var(--s3);background:var(--s2);color:var(--muted)}
.cmsg-body{flex:1;min-width:0}
.cmsg-name{font-size:10px;font-weight:700;margin-bottom:1px;display:flex;align-items:center;gap:4px}
.n-host,.n-owner{color:var(--gold)}
.n-admin{color:var(--red)}
.n-mod{color:var(--green)}
.n-member{color:var(--a2)}
.n-guest{color:var(--muted)}
.nbadge{font-size:8px;padding:1px 4px;border-radius:3px;font-weight:800}
.nb-host,.nb-owner{background:rgba(255,215,0,.15);color:var(--gold)}
.nb-admin{background:rgba(255,71,87,.15);color:var(--red)}
.nb-mod{background:rgba(46,213,115,.12);color:var(--green)}
.nb-member{background:rgba(0,229,255,.1);color:var(--a2)}
.nb-guest{background:rgba(255,255,255,.06);color:var(--muted)}
.cmsg-text{font-size:12px;line-height:1.45;word-break:break-word;color:var(--text)}
.cmsg-ts{font-size:9px;color:var(--muted);margin-top:1px}
.sys-msg{text-align:center;font-size:10px;color:var(--muted);padding:2px 0;font-style:italic}
.react-bar{display:flex;gap:4px;padding:6px 10px;border-top:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.rbtn{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:20px;padding:3px 8px;cursor:pointer;font-size:14px;transition:.2s}
.rbtn:hover{background:rgba(255,255,255,.1);transform:scale(1.25)}
.chat-inp-row{padding:8px 10px;border-top:1px solid var(--border);display:flex;gap:6px;flex-shrink:0;background:var(--s1)}
.chat-inp{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:7px 12px;font-size:12px;outline:none;transition:.2s;font-family:inherit}
.chat-inp:focus{border-color:rgba(124,111,255,.5);box-shadow:0 0 0 3px rgba(124,111,255,.1)}
.chat-inp::placeholder{color:var(--muted)}
.send-btn{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--a2));border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:.2s;flex-shrink:0}
.send-btn:hover{transform:scale(1.1)}
.viewers-tab{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:5px}
.vrow{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--s1);border-radius:9px;border:1px solid var(--border)}
.vrow-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.vrow-info{flex:1;min-width:0}
.vrow-name{font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vrow-role{font-size:9px;color:var(--muted)}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);flex-shrink:0}
.float-emoji{position:fixed;font-size:32px;pointer-events:none;animation:floatUp 2.2s ease-out forwards;z-index:9999}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-150px) scale(1.5)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:8px 16px;font-size:12px;color:var(--text);opacity:0;transition:.3s;z-index:9999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
body.cinema .chat-side{opacity:0;pointer-events:none;transition:.5s}
body.cinema .topbar{opacity:0;pointer-events:none;transition:.5s}
body.cinema:hover .chat-side,body.cinema:hover .topbar{opacity:.2}
@media(max-width:700px){.chat-side{display:none}}
</style>
</head>
<body>
<div class="topbar">
  <span class="t-logo">��</span>
  <span class="t-title">{{ room.title }}</span>
  <div class="pill pill-live"><span class="live-dot"></span>LIVE</div>
  <div class="pill pill-viewers"><i class="fas fa-eye"></i>&nbsp;<span id="viewerCount">1</span></div>
  <button class="tbtn tbtn-ghost" onclick="requestSync()" title="Sync with host"><i class="fas fa-sync-alt"></i></button>
  <button class="tbtn tbtn-ghost" onclick="toggleCinema()" title="Cinematic mode"><i class="fas fa-film"></i></button>
  {% if session.get('user_id') == room.host_id %}
  <button class="tbtn tbtn-danger" onclick="closeRoom()"><i class="fas fa-times"></i> End</button>
  {% endif %}
  <a href="/" class="tbtn tbtn-ghost"><i class="fas fa-arrow-left"></i></a>
</div>
<div class="main">
  <div class="video-side">
    <div class="video-wrap" id="videoWrap">
      <video id="vid" preload="metadata" playsinline style="display:block"></video>
      <iframe id="gdriveFrame" style="display:none;width:100%;height:100%;border:none;position:absolute;top:0;left:0" allowfullscreen allow="autoplay"></iframe>
      <div class="vg-bot"></div>
      <div class="role-badge" id="roleBadge"></div>
      <div class="sync-toast" id="syncToast">Syncing...</div>
      <div class="center-play" id="centerPlay" onclick="togglePlay()">
        <i class="fas fa-play" id="centerIcon"></i>
      </div>
      <div class="controls" id="controls">
        <div class="prog-wrap" id="progWrap" onclick="seekTo(event)">
          <div class="prog-track" id="progTrack">
            <div class="prog-fill" id="progFill" style="width:0%"></div>
          </div>
        </div>
        <div class="ctrl-row">
          <button class="cbtn" id="playBtn" onclick="togglePlay()"><i class="fas fa-play"></i></button>
          <button class="cbtn" onclick="skip(-10)" title="-10s"><i class="fas fa-backward"></i></button>
          <button class="cbtn" onclick="skip(10)" title="+10s"><i class="fas fa-forward"></i></button>
          <span class="time-txt" id="timeTxt">0:00 / 0:00</span>
          <span class="spacer"></span>
          <button class="cbtn speed-btn" id="speedBtn" onclick="cycleSpeed()">1x</button>
          <div class="vol-wrap">
            <button class="cbtn" onclick="toggleMute()" id="muteBtn"><i class="fas fa-volume-up"></i></button>
            <input type="range" class="vol-sl" id="volSl" min="0" max="1" step="0.02" value="1" oninput="setVol(this.value)">
          </div>
          <button class="cbtn" onclick="toggleFullscreen()"><i class="fas fa-expand"></i></button>
        </div>
      </div>
    </div>
  </div>
  <div class="chat-side">
    <div class="ctabs">
      <div class="ctab active" onclick="switchTab('chat',this)">Chat</div>
      <div class="ctab" onclick="switchTab('viewers',this)">Viewers</div>
    </div>
    <div class="tab-pane active" id="pane-chat">
      <div class="vstrip" id="vstrip"></div>
      <div class="chat-msgs" id="chatMsgs"></div>
      <div class="react-bar">
        <button class="rbtn" onclick="sendReact('❤️')">❤️</button>
        <button class="rbtn" onclick="sendReact('😂')">😂</button>
        <button class="rbtn" onclick="sendReact('😮')">😮</button>
        <button class="rbtn" onclick="sendReact('👏')">👏</button>
        <button class="rbtn" onclick="sendReact('🔥')">��</button>
        <button class="rbtn" onclick="sendReact('💀')">💀</button>
        <button class="rbtn" onclick="sendReact('🎉')">🎉</button>
        <button class="rbtn" onclick="sendReact('😭')">😭</button>
      </div>
      <div class="chat-inp-row">
        <input class="chat-inp" id="chatInp" placeholder="Say something..." maxlength="500" onkeydown="if(event.key==='Enter')sendChat()">
        <button class="send-btn" onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
    <div class="tab-pane" id="pane-viewers">
      <div class="viewers-tab" id="viewersTab"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var ROOM_ID   = "{{ room.room_id }}";
var VIDEO_URL = {{ room.video_url | tojson }};
var HOST_ID   = "{{ room.host_id }}";
var HOST_NAME = "{{ room.host_name }}";
var MY_ID     = "{{ user_id }}";
var MY_NAME   = "{{ username }}";
var MY_AVATAR = "";
var IS_HOST   = (MY_ID === HOST_ID) || (MY_NAME === HOST_NAME);
var myRoleLevel = 0;
var isSyncing = false;
var _playPromise = null;
var speeds = [0.5, 0.75, 1, 1.25, 1.5, 2];
var speedIdx = 2;

var vid        = document.getElementById("vid");
var playBtn    = document.getElementById("playBtn");
var centerIcon = document.getElementById("centerIcon");
var progFill   = document.getElementById("progFill");
var timeTxt    = document.getElementById("timeTxt");
var chatMsgs   = document.getElementById("chatMsgs");
var syncToast  = document.getElementById("syncToast");
var videoWrap  = document.getElementById("videoWrap");

var RN  = {4:"Owner",3:"Admin",2:"Mod",1:"Member",0:"Guest"};
var RL  = {4:"Owner",3:"Admin",2:"Mod",1:"Member",0:"Guest"};
var RAV = {4:"av-owner",3:"av-admin",2:"av-mod",1:"av-member",0:"av-guest"};
var RNM = {4:"n-owner",3:"n-admin",2:"n-mod",1:"n-member",0:"n-guest"};
var RNB = {4:"nb-owner",3:"nb-admin",2:"nb-mod",1:"nb-member",0:"nb-guest"};

function canControl(){ return IS_HOST || myRoleLevel >= 2; }

function showToast(msg, dur) {
  dur = dur || 2500;
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, dur);
}

function switchTab(name, el) {
  document.querySelectorAll(".ctab").forEach(function(t){ t.classList.remove("active"); });
  document.querySelectorAll(".tab-pane").forEach(function(p){ p.classList.remove("active"); });
  el.classList.add("active");
  document.getElementById("pane-" + name).classList.add("active");
}

function fixVideoUrl(url) {
  if (!url) return url;
  // Google Drive
  var gdMatch = url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);
  if (gdMatch) return 'gdrive:' + gdMatch[1];
  // YouTube
  var ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]{11})/);
  if (ytMatch) return 'youtube:' + ytMatch[1];
  // Dropbox
  if (url.includes('dropbox.com')) return url.replace('dl=0','dl=1').replace('www.dropbox.com','dl.dropboxusercontent.com');
  return url;
}

var IS_IFRAME = false;

function initVideo() {
  if (!VIDEO_URL || vid.src) return;
  var fixed = fixVideoUrl(VIDEO_URL);
  _loadFixed(fixed);
}

function _loadFixed(fixed) {
  var frame = document.getElementById('gdriveFrame');
  if (fixed.startsWith('gdrive:')) {
    IS_IFRAME = true;
    var fileId = fixed.replace('gdrive:','');
    frame.src = 'https://drive.google.com/file/d/' + fileId + '/preview';
    frame.style.display = 'block';
    vid.style.display = 'none';
    document.getElementById('centerPlay').style.display = 'none';
    document.getElementById('controls').style.display = 'none';
    showToast('▶️ Google Drive — use the player controls inside the video');
  } else if (fixed.startsWith('youtube:')) {
    IS_IFRAME = true;
    var videoId = fixed.replace('youtube:','');
    frame.src = 'https://www.youtube.com/embed/' + videoId + '?autoplay=1&rel=0&modestbranding=1';
    frame.style.display = 'block';
    vid.style.display = 'none';
    document.getElementById('centerPlay').style.display = 'none';
    document.getElementById('controls').style.display = 'none';
    showToast('▶️ YouTube video loaded — use the player controls inside the video');
  } else {
    IS_IFRAME = false;
    vid.src = fixed;
    vid.load();
  }
}

function safePlay() {
  _playPromise = vid.play();
  if (_playPromise !== undefined) {
    _playPromise.then(function(){ _playPromise = null; }).catch(function(e){
      _playPromise = null;
      if (e.name !== "AbortError") console.warn("Play error:", e.message);
    });
  }
}

function safePause() {
  if (_playPromise !== undefined && _playPromise !== null) {
    _playPromise.then(function(){ if (!vid.paused) vid.pause(); }).catch(function(){});
  } else {
    if (!vid.paused) vid.pause();
  }
}

function togglePlay() {
  if (IS_IFRAME) { showToast('Use the controls inside the video player'); return; }
  if (vid.paused) {
    safePlay();
    if (canControl()) socket.emit("watch_play", {room_id: ROOM_ID, current_time: vid.currentTime});
  } else {
    safePause();
    if (canControl()) socket.emit("watch_pause", {room_id: ROOM_ID, current_time: vid.currentTime});
  }
}

function skip(s) {
  vid.currentTime = Math.max(0, Math.min(vid.duration || 0, vid.currentTime + s));
  if (canControl()) socket.emit("watch_seek", {room_id: ROOM_ID, current_time: vid.currentTime});
}

function seekTo(e) {
  var r = e.currentTarget.getBoundingClientRect();
  var t = ((e.clientX - r.left) / r.width) * (vid.duration || 0);
  vid.currentTime = t;
  if (canControl()) socket.emit("watch_seek", {room_id: ROOM_ID, current_time: t});
}

function setVol(v) {
  vid.volume = v;
  if (v > 0 && vid.muted) {
    vid.muted = false;
    document.getElementById("muteBtn").innerHTML = '<i class="fas fa-volume-up"></i>';
  }
}

function toggleMute() {
  vid.muted = !vid.muted;
  document.getElementById("muteBtn").innerHTML = vid.muted
    ? '<i class="fas fa-volume-mute"></i>'
    : '<i class="fas fa-volume-up"></i>';
}

function toggleFullscreen() {
  if (!document.fullscreenElement) videoWrap.requestFullscreen();
  else document.exitFullscreen();
}

function cycleSpeed() {
  speedIdx = (speedIdx + 1) % speeds.length;
  vid.playbackRate = speeds[speedIdx];
  document.getElementById("speedBtn").textContent = speeds[speedIdx] + "x";
}

function requestSync() {
  socket.emit("watch_request_sync", {room_id: ROOM_ID});
  syncToast.style.display = "block";
  setTimeout(function(){ syncToast.style.display = "none"; }, 1500);
}

function toggleCinema() {
  document.body.classList.toggle("cinema");
  showToast(document.body.classList.contains("cinema") ? "Cinematic ON — hover to reveal" : "Cinematic OFF");
}

function sendReact(emoji) {
  socket.emit("watch_mood_react", {room_id: ROOM_ID, emoji: emoji});
  socket.emit("watch_chat", {room_id: ROOM_ID, message: emoji, username: MY_NAME});
  floatEmoji(emoji);
}

function floatEmoji(e) {
  var el = document.createElement("div");
  el.className = "float-emoji";
  el.textContent = e;
  el.style.left = (15 + Math.random() * 70) + "%";
  el.style.bottom = "80px";
  document.body.appendChild(el);
  setTimeout(function(){ el.remove(); }, 2300);
}

function showRoleBadge() {
  var b = document.getElementById("roleBadge");
  if (IS_HOST) { b.textContent = "Host"; b.className = "role-badge rb-host"; b.style.display = "block"; return; }
  var map = {4:["Owner","rb-owner"],3:["Admin","rb-admin"],2:["Mod","rb-mod"],1:["Member","rb-member"]};
  var m = map[myRoleLevel];
  if (m) { b.textContent = m[0]; b.className = "role-badge " + m[1]; b.style.display = "block"; }
  else b.style.display = "none";
}

function sendChat() {
  var inp = document.getElementById("chatInp");
  var msg = inp.value.trim();
  if (!msg) return;
  socket.emit("watch_chat", {room_id: ROOM_ID, message: msg, username: MY_NAME});
  inp.value = "";
}

function esc(s) { var d = document.createElement("div"); d.textContent = String(s || ""); return d.innerHTML; }

function appendMsg(d) {
  var rl = d.role_level != null ? d.role_level : 0;
  var isMe = d.user === MY_NAME;
  var avCls = isMe ? "av-host" : (RAV[rl] || "av-guest");
  var nmCls = isMe ? "n-host"  : (RNM[rl] || "n-guest");
  var nbCls = isMe ? "nb-host" : (RNB[rl] || "nb-guest");
  var label = isMe ? "HOST" : (RN[rl] || "GUEST");
  var avHtml = d.avatar ? '<img src="' + d.avatar + '" alt="">' : (d.user || "?")[0].toUpperCase();
  var div = document.createElement("div");
  div.className = "cmsg";
  div.innerHTML = '<div class="cmsg-av ' + avCls + '">' + avHtml + '</div>'
    + '<div class="cmsg-body">'
    + '<div class="cmsg-name ' + nmCls + '">' + esc(d.user) + '<span class="nbadge ' + nbCls + '">' + label + '</span></div>'
    + '<div class="cmsg-text">' + esc(d.msg) + '</div>'
    + '<div class="cmsg-ts">' + (d.ts || "") + '</div>'
    + '</div>';
  chatMsgs.appendChild(div);
  chatMsgs.scrollTop = chatMsgs.scrollHeight;
}

function addSysMsg(t) {
  var d = document.createElement("div");
  d.className = "sys-msg";
  d.textContent = t;
  chatMsgs.appendChild(d);
  chatMsgs.scrollTop = chatMsgs.scrollHeight;
}

function renderViewers(viewers) {
  var strip = document.getElementById("vstrip");
  var tab   = document.getElementById("viewersTab");
  strip.innerHTML = "";
  tab.innerHTML   = "";
  (viewers || []).forEach(function(v) {
    var rl = v.role_level != null ? v.role_level : 0;
    var chip = document.createElement("div");
    chip.className = "vchip";
    chip.innerHTML = '<span class="vdot"></span>' + esc(v.name);
    strip.appendChild(chip);
    var avCls = RAV[rl] || "av-guest";
    var row = document.createElement("div");
    row.className = "vrow";
    row.innerHTML = '<div class="vrow-av ' + avCls + '">' + (v.name || "?")[0].toUpperCase() + '</div>'
      + '<div class="vrow-info"><div class="vrow-name">' + esc(v.name) + '</div><div class="vrow-role">' + (RL[rl] || "Guest") + '</div></div>'
      + '<div class="online-dot"></div>';
    tab.appendChild(row);
  });
}

function closeRoom() {
  if (!confirm("End the watch party for everyone?")) return;
  fetch("/api/watch/" + ROOM_ID + "/close", {method: "POST"}).then(function(){ window.location.href = "/"; });
}

vid.addEventListener("play", function() {
  playBtn.innerHTML = '<i class="fas fa-pause"></i>';
  centerIcon.className = "fas fa-pause";
  videoWrap.classList.remove("paused");
});
vid.addEventListener("pause", function() {
  playBtn.innerHTML = '<i class="fas fa-play"></i>';
  centerIcon.className = "fas fa-play";
  videoWrap.classList.add("paused");
});
vid.addEventListener("timeupdate", function() {
  if (!vid.duration) return;
  var pct = (vid.currentTime / vid.duration) * 100;
  progFill.style.width = pct + "%";
  timeTxt.textContent = fmt(vid.currentTime) + " / " + fmt(vid.duration);
});
vid.addEventListener("error", function() {
  showToast("Video error — check the file or URL", 4000);
});
vid.addEventListener("loadedmetadata", function() {
  showToast("Video ready — click play!");
});

function fmt(s) {
  if (!s || isNaN(s)) return "0:00";
  var h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
  return h ? (h + ":" + String(m).padStart(2,"0") + ":" + String(sec).padStart(2,"0")) : (m + ":" + String(sec).padStart(2,"0"));
}

document.addEventListener("keydown", function(e) {
  if (e.target.tagName === "INPUT") return;
  if (e.code === "Space") { e.preventDefault(); togglePlay(); }
  if (e.code === "ArrowLeft") skip(-10);
  if (e.code === "ArrowRight") skip(10);
  if (e.code === "KeyF") toggleFullscreen();
  if (e.code === "KeyM") toggleMute();
  if (e.code === "KeyC") toggleCinema();
});

var socket = io({transports: ["websocket", "polling"]});

socket.on("connect", function() {
  initVideo();
  socket.emit("watch_join", {room_id: ROOM_ID, username: MY_NAME, user_id: MY_ID, avatar: MY_AVATAR});
});

socket.on("watch_state", function(d) {
  // Update video source if server provides a different URL
  if (d.video_url && d.video_url !== VIDEO_URL) {
    VIDEO_URL = d.video_url;
    _loadFixed(fixVideoUrl(VIDEO_URL));
  } else {
    initVideo();
  }
  var t = d.current_time || 0;
  if (Math.abs(vid.currentTime - t) > 2) vid.currentTime = t;
  if (d.is_playing) {
    safePlay();
  } else {
    if (!vid.paused) safePause();
  }
  myRoleLevel = d.my_role_level != null ? d.my_role_level : 0;
  if (d.my_discord_id) MY_ID = d.my_discord_id;
  if (d.my_avatar && !MY_AVATAR) MY_AVATAR = d.my_avatar;
  IS_HOST = MY_ID === HOST_ID || MY_NAME === HOST_NAME;
  document.getElementById("viewerCount").textContent = d.viewer_count || 1;
  chatMsgs.innerHTML = "";
  (d.chat_history || []).forEach(function(m){ appendMsg(m); });
  chatMsgs.scrollTop = chatMsgs.scrollHeight;
  showRoleBadge();
  if (d.viewers) renderViewers(d.viewers);
});

socket.on("watch_sync", function(d) {
  if (isSyncing) return;
  isSyncing = true;
  if (Math.abs(vid.currentTime - (d.current_time || 0)) > 1.5) {
    syncToast.style.display = "block";
    vid.currentTime = d.current_time;
    setTimeout(function(){ syncToast.style.display = "none"; }, 1200);
  }
  if (d.action === "play" || (d.is_playing && vid.paused)) safePlay();
  else if (d.action === "pause" || (!d.is_playing && !vid.paused)) safePause();
  if (d.action === "seek") vid.currentTime = d.current_time;
  setTimeout(function(){ isSyncing = false; }, 300);
});

socket.on("watch_chat_msg", appendMsg);

socket.on("mood_effect", function(d){ floatEmoji(d.emoji); });

socket.on("viewer_joined", function(d) {
  document.getElementById("viewerCount").textContent = d.viewer_count;
  addSysMsg(d.name + " joined");
  if (d.viewers) renderViewers(d.viewers);
});

socket.on("viewer_left", function(d) {
  document.getElementById("viewerCount").textContent = d.viewer_count;
  addSysMsg(d.name + " left");
  if (d.viewers) renderViewers(d.viewers);
});

socket.on("room_closed", function() {
  addSysMsg("Watch party ended.");
  setTimeout(function(){ window.location.href = "/"; }, 3000);
});

socket.on("error", function(d){ addSysMsg("Error: " + (d.message || d)); });

socket.on("disconnect", function(){ addSysMsg("Disconnected — reconnecting..."); });

socket.on("reconnect", function() {
  addSysMsg("Reconnected");
  socket.emit("watch_join", {room_id: ROOM_ID, username: MY_NAME, user_id: MY_ID, avatar: MY_AVATAR});
});

window.addEventListener("beforeunload", function(){ socket.emit("watch_leave", {room_id: ROOM_ID}); });
</script>
</body>
</html>
